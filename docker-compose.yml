version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: inspectpro
      POSTGRES_USER: inspectpro
      POSTGRES_PASSWORD: inspectpro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspectpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://inspectpro:inspectpro@db/inspectpro
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads

  admin:
    image: nginx:alpine
    restart: always
    volumes:
      - ./admin-web:/usr/share/nginx/html:ro
    ports:
      - "3000:80"

volumes:
  postgres_data:
